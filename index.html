<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Default page title — overridden by React SEO component on each page -->
    <title>Mini Split Installation Kirkland &amp; Bellevue | Climate Control Club Pros</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Climate Control Club Pros" />

    <meta property="og:description" content="Licensed mini split installation, replacement, and repair in Kirkland and Bellevue, WA." />

    <!-- Local Business Schema — baseline for all pages -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "HVACBusiness",
      "name": "Climate Control Club Pros",
      "description": "Premium ductless mini split installation for homeowners who want efficient heating and cooling, clean work, and reliable comfort.",
      "telephone": "(425) 555-0188",
      "email": "info@climatecontrolclubpros.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Kirkland",
        "addressRegion": "WA",
        "postalCode": "98033",
        "addressCountry": "US"
      },
      "areaServed": [
        {"@type": "City", "name": "Kirkland"},
        {"@type": "City", "name": "Bellevue"},
        {"@type": "City", "name": "Redmond"},
        {"@type": "City", "name": "Kenmore"},
        {"@type": "City", "name": "Bothell"}
      ],
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "08:00",
          "closes": "18:00"
        }
      ],
      "priceRange": "$$",
      "url": "https://climatecontrolclubpros.com"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
